<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockSense Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0F172A; color: #E2E8F0; min-height: 100vh; }
  header { background: #1E3A8A; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 1.4rem; color: white; }
  header span { font-size: 0.85rem; color: #93C5FD; }
  .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }
  .ticker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .ticker-btn { background: #1E293B; border: 2px solid #334155; border-radius: 10px; padding: 12px 16px;
                cursor: pointer; transition: all 0.2s; color: #E2E8F0; text-align: left; }
  .ticker-btn:hover, .ticker-btn.active { border-color: #3B82F6; background: #1E3A8A; }
  .ticker-btn .code { font-size: 0.75rem; color: #64748B; }
  .ticker-btn .name { font-weight: 600; }
  .panel { background: #1E293B; border-radius: 12px; padding: 24px; }
  .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .panel-title { font-size: 1.2rem; font-weight: 700; }
  .btn { background: #3B82F6; color: white; border: none; border-radius: 8px;
         padding: 8px 18px; cursor: pointer; font-size: 0.9rem; transition: background 0.2s; }
  .btn:hover { background: #2563EB; }
  .btn-sm { padding: 5px 12px; font-size: 0.8rem; }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: #0F172A; border-radius: 8px; padding: 14px; }
  .stat-card .label { font-size: 0.75rem; color: #64748B; margin-bottom: 4px; }
  .stat-card .value { font-size: 1.3rem; font-weight: 700; }
  .up { color: #EF4444; }
  .down { color: #3B82F6; }
  .neutral { color: #94A3B8; }
  .opinion-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
  .opinion-강력매수 { background: #7F1D1D; color: #FCA5A5; }
  .opinion-매수 { background: #1C1917; color: #FED7AA; }
  .opinion-중립 { background: #1E293B; color: #94A3B8; border: 1px solid #334155; }
  .opinion-매도 { background: #172554; color: #93C5FD; }
  .opinion-강력매도 { background: #0C1838; color: #60A5FA; border: 1px solid #1D4ED8; }
  .comment-box { background: #0F172A; border-radius: 8px; padding: 14px; font-size: 0.9rem;
                 line-height: 1.6; color: #CBD5E1; margin-bottom: 16px; white-space: pre-wrap; }
  .price-range { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .range-card { background: #0F172A; border-radius: 8px; padding: 14px; }
  .range-card.bull { border-left: 3px solid #EF4444; }
  .range-card.bear { border-left: 3px solid #3B82F6; }
  .range-card h4 { font-size: 0.8rem; color: #94A3B8; margin-bottom: 8px; }
  .range-val { font-size: 1rem; font-weight: 600; }
  .news-sent { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .sent-bar { display: flex; height: 8px; border-radius: 4px; overflow: hidden; flex: 1; min-width: 100px; }
  .sent-pos { background: #22C55E; }
  .sent-neu { background: #94A3B8; }
  .sent-neg { background: #EF4444; }
  .history-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .history-table th { background: #0F172A; padding: 8px 12px; text-align: left; color: #64748B; }
  .history-table td { padding: 7px 12px; border-bottom: 1px solid #1E293B; }
  .correct { color: #22C55E; }
  .wrong { color: #EF4444; }
  .loading { color: #64748B; text-align: center; padding: 40px; }
  .error { color: #EF4444; padding: 12px; background: #1C0A0A; border-radius: 6px; }
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; }
  .tab { padding: 7px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem;
         background: #0F172A; color: #64748B; border: 1px solid #1E293B; }
  .tab.active { background: #1E3A8A; color: #93C5FD; border-color: #3B82F6; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .report-actions { display: flex; gap: 8px; }
  .log-box { background: #0B1220; border: 1px solid #1E293B; border-radius: 8px; padding: 8px 0; max-height: 480px; overflow-y: auto; font-family: Consolas, monospace; font-size: 0.78rem; }
  .log-row { display: flex; gap: 10px; padding: 3px 14px; }
  .log-row:hover { background: #111c30; }
  .log-time { color: #64748B; white-space: nowrap; }
  .log-lvl { width: 44px; font-weight: 700; }
  .log-INFO { color: #93C5FD; } .log-WARNING { color: #FBBF24; } .log-ERROR { color: #F87171; } .log-OK { color: #22C55E; }
  .log-name { color: #94A3B8; white-space: nowrap; }
  .log-msg { color: #CBD5E1; word-break: break-word; }
</style>
</head>
<body>
<header>
  <h1>📊 StockSense</h1>
  <span>AI 기반 한국 주식 예측 시스템</span>
</header>
<div style="background:#3B1D1D;border-bottom:1px solid #7F1D1D;color:#FCA5A5;font-size:0.8rem;padding:8px 24px;text-align:center">
  ⚠️ 본 서비스의 예측·리포트는 알고리즘 기반 <b>참고 자료</b>이며 투자 권유가 아닙니다. 투자 결정과 손실의 책임은 투자자 본인에게 있습니다.
</div>
<div class="container">
  <div class="ticker-grid">
    {% for t in tickers %}
    <button class="ticker-btn" onclick="selectTicker('{{t.code}}', '{{t.name}}')" id="btn-{{t.code}}">
      <div class="code">{{t.code}}</div>
      <div class="name">{{t.name}}</div>
    </button>
    {% endfor %}
  </div>

  <div class="panel" id="main-panel" style="display:none">
    <div class="panel-header">
      <span class="panel-title" id="panel-title">—</span>
      <div class="report-actions">
        <button class="btn btn-sm" onclick="loadHistory()">백테스트</button>
        <button class="btn btn-sm" onclick="downloadReport()">📄 PDF</button>
        <button class="btn" onclick="loadPrediction()">예측 조회</button>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('prediction')">예측</div>
      <div class="tab" onclick="loadChart()">주가 차트</div>
      <div class="tab" onclick="loadHistory()">백테스트 기록</div>
      <div class="tab" onclick="loadLogs()">실행 로그</div>
    </div>

    <div id="tab-prediction" class="tab-content active">
      <div id="prediction-content"><div class="loading">종목을 선택하고 예측 조회를 누르세요.</div></div>
    </div>
    <div id="tab-chart" class="tab-content">
      <div id="chart-content"><div class="loading">주가 차트 탭을 눌러 차트를 불러오세요.</div></div>
    </div>
    <div id="tab-history" class="tab-content">
      <div id="history-content"><div class="loading">백테스트 버튼을 눌러 기록을 불러오세요.</div></div>
    </div>
    <div id="tab-logs" class="tab-content">
      <div id="logs-content"><div class="loading">실행 로그 탭을 눌러 최근 로그를 불러오세요.</div></div>
    </div>
  </div>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
