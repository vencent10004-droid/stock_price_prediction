<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockSense Dashboard</title>
<style>
  /* ── 시맨틱 디자인 토큰 (참고 이미지 기반 라이트 테마) ───────────── */
  :root {
    --bg: #E9ECF9;
    --surface: #FFFFFF;
    --surface-muted: #F4F6FC;
    --surface-raised: #FBFBFE;
    --text-primary: #23243A;
    --text-secondary: #6B7095;
    --text-tertiary: #9CA1C2;
    --primary: #4F5BD5;
    --primary-strong: #3A44B5;
    --primary-soft: #ECEEFC;
    --accent: #F2935C;
    --accent-soft: #FCEEE3;
    --up: #E54848;          /* 상승(한국 관례: 빨강) */
    --down: #3F6BE0;        /* 하락(파랑) */
    --pos: #2BB673;
    --neg: #E54848;
    --border: #E5E8F5;
    --radius-card: 16px;
    --radius-sm: 10px;
    --radius-pill: 999px;
    --shadow: 0 2px 10px rgba(45,55,120,0.06);
    --shadow-hover: 0 8px 24px rgba(45,55,120,0.13);
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Malgun Gothic', '맑은 고딕', Arial, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text-primary);
         min-height: 100vh; font-size: 14px; line-height: 1.5; }

  /* ── 헤더 ───────────────────────────────────────────────────── */
  header { background: var(--surface); padding: 14px 28px; display: flex; align-items: center;
           gap: 14px; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 10; }
  .logo-mark { width: 34px; height: 34px; border-radius: var(--radius-sm);
               background: linear-gradient(135deg, var(--primary), #7C86E8);
               display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
  header h1 { font-size: 1.25rem; font-weight: 700; color: var(--text-primary); letter-spacing: -0.01em; }
  header span { font-size: 0.82rem; color: var(--text-secondary); }

  .disclaimer { background: #FCECEC; border-bottom: 1px solid #F4CFCF; color: #B23039;
                font-size: 0.78rem; padding: 9px 28px; text-align: center; }

  .container { max-width: 1240px; margin: 0 auto; padding: 28px 20px; }
  .section-label { font-size: 0.78rem; font-weight: 600; color: var(--text-secondary);
                   text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 12px; }

  /* ── 종목 선택 카드 ─────────────────────────────────────────── */
  .ticker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
                 gap: 12px; margin-bottom: 28px; }
  .ticker-btn { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-card);
                padding: 14px 16px; cursor: pointer; transition: all 0.18s ease; text-align: left;
                box-shadow: var(--shadow); color: var(--text-primary); }
  .ticker-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); border-color: #C7CCF0; }
  .ticker-btn.active { border-color: var(--primary); background: var(--primary-soft); }
  .ticker-btn:focus-visible { outline: 3px solid rgba(79,91,213,0.4); outline-offset: 2px; }
  .ticker-btn .code { font-size: 0.72rem; color: var(--text-tertiary); margin-bottom: 2px; }
  .ticker-btn .name { font-weight: 700; font-size: 0.98rem; }

  /* ── 패널 ───────────────────────────────────────────────────── */
  .panel { background: var(--surface); border-radius: var(--radius-card); padding: 26px;
           box-shadow: var(--shadow); }
  .panel-header { display: flex; justify-content: space-between; align-items: center;
                  margin-bottom: 22px; flex-wrap: wrap; gap: 12px; }
  .panel-title { font-size: 1.22rem; font-weight: 700; }

  .btn { background: var(--primary); color: #fff; border: none; border-radius: var(--radius-pill);
         padding: 9px 20px; cursor: pointer; font-size: 0.88rem; font-weight: 600;
         transition: background 0.18s, transform 0.1s; font-family: var(--font); }
  .btn:hover { background: var(--primary-strong); }
  .btn:active { transform: scale(0.97); }
  .btn:focus-visible { outline: 3px solid rgba(79,91,213,0.4); outline-offset: 2px; }
  .btn-sm { padding: 7px 14px; font-size: 0.82rem; background: var(--surface-muted);
            color: var(--primary); border: 1px solid var(--border); }
  .btn-sm:hover { background: var(--primary-soft); }
  .report-actions { display: flex; gap: 8px; }

  /* ── 탭 ─────────────────────────────────────────────────────── */
  .tabs { display: flex; gap: 6px; margin-bottom: 22px; }
  .tab { padding: 8px 18px; border-radius: var(--radius-pill); cursor: pointer; font-size: 0.85rem;
         font-weight: 600; background: var(--surface-muted); color: var(--text-secondary);
         border: 1px solid var(--border); transition: all 0.18s; }
  .tab:hover { background: var(--primary-soft); }
  .tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ── 통계 카드 ──────────────────────────────────────────────── */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
               gap: 14px; margin-bottom: 24px; }
  .stat-card { background: var(--surface-muted); border: 1px solid var(--border);
               border-radius: var(--radius-card); padding: 16px 18px; }
  .stat-card .label { font-size: 0.74rem; color: var(--text-secondary); margin-bottom: 6px; }
  .stat-card .value { font-size: 1.32rem; font-weight: 700; }
  .up { color: var(--up); }
  .down { color: var(--down); }
  .neutral { color: var(--text-secondary); }

  /* ── 투자의견 배지 ──────────────────────────────────────────── */
  .opinion-badge { display: inline-block; padding: 5px 14px; border-radius: var(--radius-pill);
                   font-size: 0.82rem; font-weight: 700; }
  .opinion-강력매수 { background: #FCE3E3; color: #C42B2B; }
  .opinion-매수 { background: var(--accent-soft); color: #C76A2E; }
  .opinion-중립 { background: var(--surface-muted); color: var(--text-secondary); border: 1px solid var(--border); }
  .opinion-매도 { background: #E5ECFC; color: #2F55C0; }
  .opinion-강력매도 { background: #DCE6FB; color: #1F45B5; }

  .comment-box { background: var(--surface-muted); border: 1px solid var(--border); border-radius: var(--radius-card);
                 padding: 16px; font-size: 0.9rem; line-height: 1.7; color: var(--text-primary);
                 margin-bottom: 16px; white-space: pre-wrap; }

  /* ── 가격대 시나리오 ────────────────────────────────────────── */
  .price-range { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
  .range-card { background: var(--surface-muted); border: 1px solid var(--border);
                border-radius: var(--radius-card); padding: 16px; }
  .range-card.bull { border-left: 4px solid var(--up); }
  .range-card.bear { border-left: 4px solid var(--down); }
  .range-card h4 { font-size: 0.82rem; color: var(--text-secondary); margin-bottom: 8px; }
  .range-val { font-size: 1.02rem; font-weight: 700; }

  /* ── 뉴스 감성 ──────────────────────────────────────────────── */
  .news-sent { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .sent-bar { display: flex; height: 9px; border-radius: var(--radius-pill); overflow: hidden; flex: 1; min-width: 100px; }
  .sent-pos { background: var(--pos); }
  .sent-neu { background: var(--text-tertiary); }
  .sent-neg { background: var(--neg); }

  /* ── 백테스트 표 ────────────────────────────────────────────── */
  .history-table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
  .history-table th { background: var(--surface-muted); padding: 10px 12px; text-align: left;
                      color: var(--text-secondary); font-weight: 600; }
  .history-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); }
  .history-table tr:hover td { background: var(--surface-raised); }
  .correct { color: var(--pos); font-weight: 700; }
  .wrong { color: var(--neg); font-weight: 700; }

  .loading { color: var(--text-secondary); text-align: center; padding: 48px; }
  .error { color: var(--neg); padding: 14px; background: #FCECEC; border: 1px solid #F4CFCF; border-radius: var(--radius-sm); }

  /* ── 실행 로그 ──────────────────────────────────────────────── */
  .log-box { background: var(--surface-muted); border: 1px solid var(--border); border-radius: var(--radius-card);
             padding: 8px 0; max-height: 480px; overflow-y: auto;
             font-family: 'Consolas', 'D2Coding', monospace; font-size: 0.78rem; }
  .log-row { display: flex; gap: 10px; padding: 4px 14px; }
  .log-row:hover { background: var(--surface-raised); }
  .log-time { color: var(--text-tertiary); white-space: nowrap; }
  .log-lvl { width: 44px; font-weight: 700; }
  .log-name { color: var(--text-secondary); white-space: nowrap; }
  .log-msg { color: var(--text-primary); word-break: break-word; }
  .log-INFO { color: var(--primary); } .log-WARNING { color: #D98A1F; }
  .log-ERROR { color: var(--neg); } .log-OK { color: var(--pos); }
</style>
</head>
<body>
<header>
  <div class="logo-mark">📊</div>
  <div>
    <h1>StockSense</h1>
    <span>AI 기반 한국 주식 예측 시스템</span>
  </div>
</header>
<div class="disclaimer">
  ⚠️ 본 서비스의 예측·리포트는 알고리즘 기반 <b>참고 자료</b>이며 투자 권유가 아닙니다. 투자 결정과 손실의 책임은 투자자 본인에게 있습니다.
</div>
<div class="container">
  <div class="section-label">종목 선택</div>
  <div class="ticker-grid">
    {% for t in tickers %}
    <button class="ticker-btn" onclick="selectTicker('{{t.code}}', '{{t.name}}')" id="btn-{{t.code}}">
      <div class="code">{{t.code}}</div>
      <div class="name">{{t.name}}</div>
    </button>
    {% endfor %}
  </div>

  <div class="panel" id="main-panel" style="display:none">
    <div class="panel-header">
      <span class="panel-title" id="panel-title">—</span>
      <div class="report-actions">
        <button class="btn btn-sm" onclick="loadHistory()">백테스트</button>
        <button class="btn btn-sm" onclick="downloadReport()">📄 PDF</button>
        <button class="btn" onclick="loadPrediction()">예측 조회</button>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('prediction')">예측</div>
      <div class="tab" onclick="switchTab('history')">백테스트 기록</div>
      <div class="tab" onclick="loadLogs()">실행 로그</div>
    </div>

    <div id="tab-prediction" class="tab-content active">
      <div id="prediction-content"><div class="loading">종목을 선택하고 예측 조회를 누르세요.</div></div>
    </div>
    <div id="tab-history" class="tab-content">
      <div id="history-content"><div class="loading">백테스트 버튼을 눌러 기록을 불러오세요.</div></div>
    </div>
    <div id="tab-logs" class="tab-content">
      <div id="logs-content"><div class="loading">실행 로그 탭을 눌러 최근 로그를 불러오세요.</div></div>
    </div>
  </div>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
